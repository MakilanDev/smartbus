{% extends 'base.html' %}{% block content %}<div class="page-head"><div><span class="eyebrow">Plan your journey</span><h1>Find your bus</h1><p>Comfortable coaches, clear times, no surprises.</p></div></div><div class="search-panel glass compact"><form id="routeSearch" class="search-grid"><label><span>From</span><div><i class="bi bi-geo-alt"></i><input name="from" value="{{request.args.get('from','Jaffna')}}"></div></label><button type="button" class="swap"><i class="bi bi-arrow-left-right"></i></button><label><span>To</span><div><i class="bi bi-geo"></i><input name="to" value="{{request.args.get('to','Colombo')}}"></div></label><label><span>Date</span><div><i class="bi bi-calendar3"></i><input type="date" name="date" value="{{request.args.get('date','')}}"></div></label><button class="btn-primary-xl">Search</button></form></div><div class="result-toolbar"><b id="resultCount">Searching routes…</b><button class="filter-btn"><i class="bi bi-sliders"></i> Filters</button></div><div id="scheduleResults" class="results"></div>{% endblock %}{% block scripts %}<script src="{{url_for('static',filename='js/search.js')}}"></script>{% endblock %}
